<!DOCTYPE html>
<html>
<head>
    <title>配車管理システム - ドライバー用</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: #1a1a1a; color: #eee; }
        #admin-map { height: 280px; width: 100%; border-radius: 12px; margin-bottom: 15px; background: #333; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .request-card { background: #2d2d2d; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 5px solid #ffc107; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .user-name { font-size: 1.1em; font-weight: bold; color: #ffc107; margin-bottom: 5px; }
        .addr-text { font-size: 0.9em; color: #ccc; margin-bottom: 12px; line-height: 1.4; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        button { border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.95); opacity: 0.8; }
        
        .btn-eta { background: #555; color: white; }
        .btn-arrive { background: #d93025; color: white; }
        .btn-complete { background: #28a745; color: white; grid-column: span 2; margin-top: 5px; }
        
        .status-info { font-size: 0.8em; color: #888; margin-top: 10px; text-align: right; }
    </style>
</head>
<body>

    <h2 style="font-size: 1.1em; margin: 5px 0 10px 5px;">🚕 配車管理（最新URL版）</h2>
    
    <div id="admin-map"></div>

    <div id="admin-list">データを読み込み中...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // ★新しいGASのURLに差し替え完了
        const gasUrl = "https://script.google.com/macros/s/AKfycbx0-lafxReulEofMDMPhJA3maxeIcddrz5lJdWKthJQ9CN5eNExMeunYH75C_Yezr0MVg/exec";

        let map, markers = {};

        function initMap() {
            if (map) return;
            map = L.map('admin-map').setView([35.6812, 139.7671], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        }

        // 到着通知をLINEへ送信
        window.markAsArrived = async (id, userId) => {
            if (!confirm("お客様へ到着通知を送りますか？")) return;
            try {
                await updateDoc(doc(db, "requests", id), { status: "arrived" });
                
                fetch(gasUrl, { 
                    method: "POST", 
                    mode: "no-cors", 
                    body: JSON.stringify({ action: "【到着】", userId: userId }) 
                });
                alert("到着通知を送信しました");
            } catch (e) { alert("エラー: " + e.message); }
        };

        // 到着予定時間を更新
        window.updateETA = async (id) => {
            const min = prompt("あと何分で到着しますか？", "5");
            if (min) await updateDoc(doc(db, "requests", id), { eta: min, status: "heading" });
        };

        // 完了処理
        window.completeJob = async (id) => {
            if (confirm("この依頼を完了（非表示）にしますか？")) {
                await updateDoc(doc(db, "requests", id), { status: "completed" });
            }
        };

        initMap();
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const listDiv = document.getElementById("admin-list");
            listDiv.innerHTML = "";
            Object.values(markers).forEach(m => map.removeLayer(m));
            markers = {};

            if (snapshot.empty) {
                listDiv.innerHTML = "<p style='text-align:center; color:#888;'>現在、依頼はありません。</p>";
                return;
            }

            snapshot.forEach(d => {
                const data = d.data();
                if (data.status === "completed") return;

                if (data.latitude && data.longitude) {
                    const m = L.marker([data.latitude, data.longitude]).addTo(map);
                    markers[d.id] = m;
                }

                const card = document.createElement("div");
                card.className = "request-card";
                card.innerHTML = `
                    <div class="user-name">${data.name} 様 <span style="font-size:0.7em; background:#444; padding:2px 6px; border-radius:4px; color:#fff;">${data.type==='plan'?'予約':'今すぐ'}</span></div>
                    <div class="addr-text">📍 ${data.address}</div>
                    <div class="btn-group">
                        <button class="btn-eta" onclick="updateETA('${d.id}')">🕐 あと${data.eta || '?'}分</button>
                        <button class="btn-arrive" onclick="markAsArrived('${d.id}', '${data.userId}')">📍 到着通知</button>
                        <button class="btn-complete" onclick="completeJob('${d.id}')">✅ 完了</button>
                    </div>
                    <div class="status-info">現在のステータス: ${data.status}</div>
                `;
                listDiv.appendChild(card);
            });

            const activeDocs = snapshot.docs.filter(doc => doc.data().status !== "completed");
            if (activeDocs.length > 0) {
                const lastPos = activeDocs[0].data();
                if(lastPos.latitude) map.panTo([lastPos.latitude, lastPos.longitude]);
            }
        });
    </script>
</body>
</html>
