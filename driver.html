<!DOCTYPE html>
<html>
<head>
    <title>ドライバー用画面</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .info-box { position: fixed; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="info-box">🚕 配車リクエスト待機中...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        // 1. deleteDoc と doc を追加しています
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // ここに自分のFirebase設定を貼り付けてください！
        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};

        const q = query(collection(db, "requests"), where("status", "==", "waiting"));
        
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added") {
                    // 2. ボタン付きのポップアップが出るように変更
                    const marker = L.marker([data.latitude, data.longitude])
                        .addTo(map)
                        .bindPopup(`
                            <b>依頼者: ${data.name}</b><br>
                            <button onclick="completeRequest('${id}')" style="margin-top:10px; padding:5px; cursor:pointer; background:#28a745; color:white; border:none; border-radius:3px;">✅ 迎えに行った(完了)</button>
                        `);
                    markers[id] = marker;
                } else if (change.type === "removed") {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            });
        });

        // 3. 完了ボタンを押した時の動きを定義
        window.completeRequest = async (id) => {
            if (confirm("この依頼を完了にしますか？")) {
                try {
                    await deleteDoc(doc(db, "requests", id));
                    alert("完了しました！地図からピンを消します。");
                } catch (e) {
                    console.error("エラーが発生しました: ", e);
                }
            }
        };
    </script>
</body>
</html>
