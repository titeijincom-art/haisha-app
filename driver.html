<!DOCTYPE html>
<html>
<head>
    <title>ドライバー用画面</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .info-box { position: fixed; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div class="info-box">🚕 配車リクエスト待機中...</div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};

        const q = query(collection(db, "requests"), where("status", "==", "waiting"));
        
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added") {
                    const marker = L.marker([data.latitude, data.longitude])
                        .addTo(map)
                        .bindPopup(`
                            <b>依頼者: ${data.name}</b><br>
                            <input type="number" id="time-${id}" value="5" style="width:40px"> 分で到着予定<br>
                            <button onclick="sendEta('${id}')" style="margin-top:5px; background:#007bff; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">⏳ 時間を送る</button>
                            <hr>
                            <button onclick="completeRequest('${id}')" style="background:#28a745; color:white; border:none; padding:5px; border-radius:3px; cursor:pointer;">✅ 完了（削除）</button>
                        `);
                    markers[id] = marker;
                } else if (change.type === "removed") {
                    if (markers[id]) {
                        map.removeLayer(markers[id]);
                        delete markers[id];
                    }
                }
            });
        });

        window.sendEta = async (id) => {
            const mins = document.getElementById(`time-${id}`).value;
            try {
                await updateDoc(doc(db, "requests", id), { eta: mins });
                alert("到着予定時間を送信しました！");
            } catch (e) { alert("エラー: " + e.message); }
        };

        window.completeRequest = async (id) => {
            if (confirm("この依頼を完了（削除）しますか？")) {
                try {
                    await deleteDoc(doc(db, "requests", id));
                } catch (e) { alert("エラー: " + e.message); }
            }
        };
    </script>
</body>
</html>
