<!DOCTYPE html>
<html>
<head>
    <title>ドライバー用画面（予約対応版）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 100vh; width: 100%; }
        .info-box { position: fixed; top: 10px; left: 10px; z-index: 1000; background: white; padding: 10px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); font-family: sans-serif; }
        .btn-action { color:white; border:none; padding:8px; border-radius:3px; cursor:pointer; width: 100%; margin-top: 5px; font-weight: bold; }
        .btn-blue { background:#007bff; }
        .btn-yellow { background:#ffc107; color: black; }
        .btn-green { background:#28a745; margin-top: 10px; }
        .time-label { color: #666; font-size: 0.85em; margin-bottom: 5px; display: block; background: #f8f9fa; padding: 4px; border-radius: 3px; }
        .plan-label { color: #d9534f; font-weight: bold; font-size: 0.9em; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="info-box">🚕 配車待機中...<br><small id="driver-status">位置取得中...</small></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let markers = {};
        let driverLocation = null;

        navigator.geolocation.watchPosition((position) => {
            driverLocation = { lat: position.coords.latitude, lng: position.coords.longitude };
            document.getElementById('driver-status').innerText = "📍 ドライバーの位置を確認中";
        });

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon / 2) * Math.sin(dLon / 2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        }

        const q = query(collection(db, "requests"), where("status", "in", ["waiting", "arrived"]));
        
        onSnapshot(q, (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added" || (change.type === "modified" && !markers[id])) {
                    // 依頼時間のフォーマット
                    let dateTimeStr = "不明";
                    if (data.timestamp) {
                        const d = data.timestamp.toDate();
                        dateTimeStr = `${d.getMonth()+1}/${d.getDate()} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
                    }

                    // 予約情報の作成
                    const planText = data.type === 'plan' ? 
                        `<span class="plan-label">📅 予約希望: ${data.scheduledTime.replace('T', ' ')}</span>` : 
                        `<span class="plan-label" style="color:#28a745;">⚡ 今すぐ呼ぶ</span>`;

                    let autoTime = 5;
                    if (driverLocation) {
                        const dist = getDistance(driverLocation.lat, driverLocation.lng, data.latitude, data.longitude);
                        autoTime = Math.ceil((dist / 30) * 60) + 2;
                    }

                    const marker = L.marker([data.latitude, data.longitude])
                        .addTo(map)
                        .bindPopup(`
                            <div style="min-width:180px">
                                <b>依頼者: ${data.name}</b><br>
                                ${planText}
                                <span class="time-label">🕒 依頼送信: ${dateTimeStr}</span>
                                <input type="number" id="time-${id}" value="${autoTime}" style="width:40px"> 分で到着予定<br>
                                <button class="btn-action btn-blue" onclick="sendEta('${id}')">⏳ 時間を送信</button>
                                <button class="btn-action btn-yellow" onclick="sendArrival('${id}')">📍 到着しました</button>
                                <hr>
                                <button class="btn-action btn-green" onclick="completeRequest('${id}')">✅ 送迎完了</button>
                            </div>
                        `);
                    markers[id] = marker;
                } else if (change.type === "removed") {
                    if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
                }
            });
        });

        window.sendEta = async (id) => {
            const mins = document.getElementById(`time-${id}`).value;
            try {
                await updateDoc(doc(db, "requests", id), { eta: mins });
                alert("到着予定を通知しました");
            } catch (e) { console.error(e); }
        };

        window.sendArrival = async (id) => {
            try {
                await updateDoc(doc(db, "requests", id), { status: "arrived" });
                alert("到着を通知しました！");
            } catch (e) { alert("エラー: " + e.message); }
        };

        window.completeRequest = async (id) => {
            if (confirm("送迎を完了しますか？（履歴に保存されます）")) {
                try {
                    await updateDoc(doc(db, "requests", id), { 
                        status: "completed",
                        completedAt: serverTimestamp() 
                    });
                } catch (e) { alert("エラー: " + e.message); }
            }
        };
    </script>
</body>
</html>
