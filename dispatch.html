<!DOCTYPE html>
<html>
<head>
    <title>配車管理（運転手用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #222; color: #fff; }
        h2 { border-bottom: 2px solid #444; padding-bottom: 10px; }
        .card { background: #333; padding: 15px; border-radius: 10px; margin-bottom: 15px; border-left: 5px solid #28a745; }
        .status { font-weight: bold; color: #ffc107; }
        .btn-status { padding: 10px; margin-right: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .gps-status { font-size: 0.8rem; color: #888; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>配車リクエスト一覧</h2>
    <div id="gps-info" class="gps-status">GPS接続中...</div>
    <div id="list">読み込み中...</div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // --- 1. 自分の位置（運転手）をリアルタイムで送信する処理 ---
        function startLocationTracking() {
            if (!navigator.geolocation) {
                document.getElementById('gps-info').innerText = "GPS非対応デバイスです";
                return;
            }

            // 3秒ごとに現在地を更新
            setInterval(() => {
                navigator.geolocation.getCurrentPosition(async (pos) => {
                    const coords = {
                        latitude: pos.coords.latitude,
                        longitude: pos.coords.longitude,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    try {
                        // 常に id="current" のドキュメントを上書き
                        await db.collection("driverLocation").doc("current").set(coords);
                        document.getElementById('gps-info').innerText = 
                            `GPS送信中: ${pos.coords.latitude.toFixed(4)}, ${pos.coords.longitude.toFixed(4)}`;
                    } catch (e) {
                        console.error("GPS送信エラー", e);
                    }
                }, (err) => {
                    document.getElementById('gps-info').innerText = "GPS取得エラー: " + err.message;
                }, { enableHighAccuracy: true });
            }, 3000); 
        }

        // --- 2. リクエスト一覧の表示とステータス更新 ---
        function loadRequests() {
            db.collection("requests").orderBy("timestamp", "desc").onSnapshot(snap => {
                const list = document.getElementById('list');
                list.innerHTML = "";
                snap.forEach(doc => {
                    const data = doc.data();
                    const id = doc.id;
                    const useTxt = data.useCase === 'dropoff' ? '【目的地】' : '【お迎え】';
                    
                    const div = document.createElement('div');
                    div.className = 'card';
                    div.innerHTML = `
                        <div><strong>${useTxt} ${data.address}</strong></div>
                        <div style="font-size:0.9rem; margin:5px 0;">
                            タイプ: ${data.type === 'plan' ? '予約 (' + data.scheduledTime + ')' : '今すぐ'}
                        </div>
                        <div class="status">状況: ${getStatusJp(data.status)}</div>
                        <div style="margin-top:10px;">
                            <button class="btn-status" style="background:#007bff; color:#fff;" onclick="updateStatus('${id}', 'heading')">向かう</button>
                            <button class="btn-status" style="background:#28a745; color:#fff;" onclick="updateStatus('${id}', 'arrived')">到着</button>
                            <button class="btn-status" style="background:#dc3545; color:#fff;" onclick="updateStatus('${id}', 'completed')">完了(非表示)</button>
                        </div>
                    `;
                    list.appendChild(div);
                });
            });
        }

        function getStatusJp(s) {
            if(s === 'waiting') return '待機中';
            if(s === 'heading') return '移動中';
            if(s === 'arrived') return '現地到着';
            return s;
        }

        window.updateStatus = (id, newStatus) => {
            db.collection("requests").doc(id).update({ status: newStatus });
        };

        // 実行開始
        startLocationTracking();
        loadRequests();
    </script>
</body>
</html>
