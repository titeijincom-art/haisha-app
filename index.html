<!DOCTYPE html>
<html>
<head>
    <title>配車アプリ（完全修正版）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f0f2f5; }
        #map { height: 250px; width: 100%; border-radius: 12px; margin-bottom: 12px; background: #ddd; }
        .template-section { background: white; padding: 12px; border-radius: 12px; margin-bottom: 12px; }
        .template-btns { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .tpl-btn { background: #fff; border: 1px solid #ddd; padding: 8px 16px; border-radius: 20px; font-size: 13px; white-space: nowrap; font-weight: bold; }
        .tabs { display: flex; margin-bottom: 10px; background: #e0e0e0; border-radius: 10px; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab.active { background: white; color: #28a745; }
        .input-group { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; display: none; }
        .input-group.active { display: block; }
        #request-btn { width: 100%; padding: 16px; background: #28a745; color: white; border: none; border-radius: 12px; font-size: 1.1em; font-weight: bold; }
        .request-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 6px solid #28a745; position: relative; }
        .status-badge { display: inline-block; margin-top: 8px; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.9em; }
        .status-arrived { background: #fff1f0; color: #d93025; border: 1px solid #ffccc7; }
        .status-eta { background: #e7f3ff; color: #007bff; border: 1px solid #b3d7ff; }
        .cancel-btn { position: absolute; top: 12px; right: 12px; background: #eee; border: none; border-radius: 6px; padding: 5px 10px; font-size: 0.75em; }
    </style>
</head>
<body>

    <div class="template-section">
        <div class="template-btns">
            <button class="tpl-btn" onclick="window.applyTemplate('羽田空港', 35.5494, 139.7798)">✈️ 羽田空港</button>
            <button class="tpl-btn" onclick="window.applyTemplate('東京駅', 35.6812, 139.7671)">🚅 東京駅</button>
            <button id="custom-tpl-1" class="tpl-btn" onclick="window.useCustomTemplate(1)" oncontextmenu="window.saveCustomTemplate(1); return false;">🏠 自宅保存</button>
        </div>
    </div>

    <div class="tabs">
        <div id="tab-now" class="tab active" onclick="window.switchMode('now')">今すぐ</div>
        <div id="tab-plan" class="tab" onclick="window.switchMode('plan')">予約</div>
    </div>

    <div id="plan-input" class="input-group">
        <input type="datetime-local" id="scheduled-time">
    </div>

    <div id="map"></div>
    <button id="request-btn" onclick="window.requestTaxi()">この場所で配車を依頼する</button>

    <div style="margin-top:20px;">
        <h3 style="font-size: 1.1em;">🚕 現在の状況</h3>
        <div id="my-requests-list">読み込み中...</div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, onSnapshot, doc, deleteDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // 2. Firebase設定
        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let userName = "ゲスト", mode = 'now', map, pickupMarker, editingId = null;

        // 3. 地図初期化（確実に実行されるように定義）
        function initMap() {
            if (map) return; // 二重初期化防止
            map = L.map('map').setView([35.6812, 139.7671], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            pickupMarker = L.marker([35.6812, 139.7671], { draggable: true }).addTo(map);
            
            navigator.geolocation.getCurrentPosition(pos => {
                const latlng = [pos.coords.latitude, pos.coords.longitude];
                map.setView(latlng, 16);
                pickupMarker.setLatLng(latlng);
            }, () => console.log("GPS利用不可"));
        }

        // 4. 関数を window オブジェクトに紐付けて外から呼べるようにする
        window.switchMode = (m) => {
            mode = m;
            document.getElementById('tab-now').className = (m === 'now') ? 'tab active' : 'tab';
            document.getElementById('tab-plan').className = (m === 'plan') ? 'tab active' : 'tab';
            document.getElementById('plan-input').style.display = (m === 'plan') ? 'block' : 'none';
        };

        window.applyTemplate = (name, lat, lng) => {
            pickupMarker.setLatLng([lat, lng]);
            map.setView([lat, lng], 16);
        };

        window.requestTaxi = async () => {
            const pos = pickupMarker.getLatLng();
            const sTime = document.getElementById('scheduled-time').value;
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`);
            const addr = (await res.json()).display_name || "地図上の地点";
            await addDoc(collection(db, "requests"), {
                name: userName, latitude: pos.lat, longitude: pos.lng,
                address: addr, status: "waiting", type: mode,
                scheduledTime: mode === 'plan' ? sTime : null,
                timestamp: serverTimestamp()
            });
            alert("依頼しました！");
        };

        window.cancelReq = async (id) => {
            if(confirm("取り消しますか？")) await deleteDoc(doc(db, "requests", id));
        };

        // 5. LIFF/Firestore監視
        liff.init({ liffId: "2009796540-v9rIRiac" }).then(() => {
            initMap(); // LIFF準備完了後に地図を出す
            if (liff.isLoggedIn()) {
                liff.getProfile().then(p => { 
                    userName = p.displayName; 
                    watchMyRequests(); 
                });
            } else { liff.login(); }
        }).catch(err => {
            console.error(err);
            initMap(); // エラーでも地図だけは出す
        });

        function watchMyRequests() {
            const q = query(collection(db, "requests"), where("name", "==", userName));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("my-requests-list");
                list.innerHTML = "";
                snapshot.forEach(d => {
                    const data = d.data();
                    if (data.status === "completed") return;
                    const item = document.createElement("div");
                    item.className = `request-item ${data.type}`;
                    let statusHtml = data.status === 'arrived' 
                        ? '<div class="status-badge status-arrived">📍 車が到着しました！</div>' 
                        : (data.eta ? `<div class="status-badge status-eta">🚗 あと ${data.eta} 分</div>` : '<div class="status-badge">⌛ 確認中</div>');
                    
                    item.innerHTML = `
                        <button class="cancel-btn" onclick="window.cancelReq('${d.id}')">取消</button>
                        <b>${data.type === 'plan' ? '📅 予約' : '🚕 今すぐ'}</b><br>
                        <small>${data.address}</small>${statusHtml}
                    `;
                    list.appendChild(item);
                });
            });
        }
    </script>
</body>
</html>
