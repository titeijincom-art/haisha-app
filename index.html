<!DOCTYPE html>
<html>
<head>
    <title>タクシー配車（社長専用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f8f9fa; overflow: hidden; }
        #map { height: 60vh; width: 100%; z-index: 1; }
        
        .container { padding: 15px; max-width: 500px; margin: auto; position: relative; }
        .form-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            margin-top: -20px; position: relative; z-index: 1000; 
        }
        
        h2 { font-size: 1.1rem; margin-top: 0; color: #333; text-align: center; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; }
        
        .btn-call { 
            width: 100%; padding: 18px; border: none; border-radius: 12px; 
            font-size: 1.2rem; font-weight: bold; background: #000; color: #fff; cursor: pointer; 
        }
        .btn-call:active { transform: scale(0.96); opacity: 0.8; }
        .btn-call:disabled { background: #ccc; }

        .status-badge { 
            margin-top: 15px; text-align: center; padding: 12px; border-radius: 10px; 
            background: #fffbe6; color: #856404; font-weight: bold; font-size: 0.9rem; border: 1px solid #ffe58f;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="form-card">
            <h2>🚕 配車リクエスト</h2>
            
            <div class="input-group">
                <label>現在地（地図を動かして調整）</label>
                <input type="text" id="address" value="位置情報を取得中..." readonly>
            </div>

            <div class="input-group" style="display: flex; gap: 10px;">
                <div style="flex: 1;">
                    <label>利用タイプ</label>
                    <select id="requestType" onchange="toggleTime()">
                        <option value="now">今すぐ</option>
                        <option value="plan">予約</option>
                    </select>
                </div>
                <div id="timeInput" style="flex: 1; display:none;">
                    <label>予約時間</label>
                    <input type="time" id="scheduledTime">
                </div>
            </div>

            <button id="submitBtn" class="btn-call" onclick="sendRequest()">ここに呼ぶ</button>

            <div id="status-badge" class="status-badge">ステータス: 待機中</div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        const gasUrl = "https://script.google.com/macros/s/AKfycbx0-lafxReulEofMDMPhJA3maxeIcddrz5lJdWKthJQ9CN5eNExMeunYH75C_Yezr0MVg/exec";

        let map, centerMarker, userLineId = "";

        // 地図の初期化（タイミングを制御）
        function setupMap(lat, lon) {
            if (map) return;
            map = L.map('map').setView([lat, lon], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            centerMarker = L.marker([lat, lon]).addTo(map);

            map.on('move', () => {
                const center = map.getCenter();
                centerMarker.setLatLng(center);
                updateAddress(center.lat, center.lng);
            });
            
            updateAddress(lat, lon);
        }

        async function updateAddress(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await res.json();
                document.getElementById("address").value = data.display_name.split(',')[0] || "不明な場所";
            } catch (e) { document.getElementById("address").value = "住所取得エラー"; }
        }

        async function initLiff() {
            try {
                await liff.init({ liffId: "2004245903-kY3aEEnQ" });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    userLineId = profile.userId;
                    watchStatus();
                }
            } catch (e) { console.error("LIFFエラー:", e); }
        }

        window.toggleTime = () => {
            const type = document.getElementById("requestType").value;
            document.getElementById("timeInput").style.display = type === "plan" ? "block" : "none";
        };

        window.sendRequest = async () => {
            const center = map.getCenter();
            const requestData = {
                userId: userLineId,
                name: "社長", // 名前を固定
                address: document.getElementById("address").value,
                latitude: center.lat,
                longitude: center.lng,
                type: document.getElementById("requestType").value,
                scheduledTime: document.getElementById("scheduledTime").value || "なし",
                status: "waiting",
                timestamp: new Date()
            };

            const btn = document.getElementById("submitBtn");
            btn.disabled = true;
            btn.innerText = "送信中...";

            try {
                await addDoc(collection(db, "requests"), requestData);
                fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "【新規】", ...requestData }) });
                alert("依頼を送信しました。");
            } catch (e) {
                alert("エラー: " + e.message);
                btn.disabled = false;
                btn.innerText = "もう一度送る";
            }
        };

        function watchStatus() {
            const q = query(collection(db, "requests"), where("userId", "==", userLineId), orderBy("timestamp", "desc"), limit(1));
            onSnapshot(q, (snapshot) => {
                snapshot.forEach(d => {
                    const data = d.data();
                    const badge = document.getElementById("status-badge");
                    if (data.status === "waiting") badge.innerText = "🚕 配車を待機しています...";
                    if (data.status === "heading") badge.innerText = `🚕 向かっています (あと${data.eta||'?'}分)`;
                    if (data.status === "arrived") badge.innerText = "📍 到着しました。";
                    if (data.status === "completed") {
                        badge.innerText = "✅ 完了しました";
                        document.getElementById("submitBtn").disabled = false;
                        document.getElementById("submitBtn").innerText = "再度依頼する";
                    }
                });
            });
        }

        // ページ読み込み時に位置情報を取得して地図を表示
        window.onload = () => {
            navigator.geolocation.getCurrentPosition(
                (pos) => { setupMap(pos.coords.latitude, pos.coords.longitude); },
                () => { setupMap(35.6812, 139.7671); }, // 失敗時
                { enableHighAccuracy: true }
            );
            initLiff();
        };

    </script>
</body>
</html>
