<!DOCTYPE html>
<html>
<head>
    <title>タクシー配車（社長専用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        #map { height: 50vh; width: 100%; background: #ddd; }
        
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .form-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            margin-top: -30px; position: relative; z-index: 1000; 
        }
        
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; }
        
        .btn-call { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; background: #000; color: #fff; cursor: pointer; 
        }
        .btn-call:disabled { background: #555; opacity: 0.6; }

        /* 依頼履歴リストのスタイル */
        .history-section { margin-top: 20px; }
        .history-title { font-size: 0.9rem; font-weight: bold; color: #666; margin-bottom: 10px; padding-left: 5px; }
        .request-item { 
            background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid #000;
        }
        .req-addr { font-size: 0.9rem; font-weight: bold; margin-bottom: 5px; }
        .req-info { font-size: 0.8rem; color: #777; display: flex; justify-content: space-between; }
        .status-tag { 
            display: inline-block; padding: 3px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold;
        }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-heading { background: #cfe2ff; color: #084298; }
        .status-arrived { background: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="form-card">
            <div class="input-group">
                <label>配車場所（地図を動かして調整）</label>
                <input type="text" id="address" value="位置情報を取得中..." readonly>
            </div>
            <button id="submitBtn" class="btn-call" onclick="sendRequest()" disabled>読み込み中...</button>
        </div>

        <div class="history-section">
            <div class="history-title">現在の依頼状況</div>
            <div id="history-list">
                <p style="text-align:center; color:#999; font-size:0.8rem; margin-top:20px;">アクティブな依頼はありません
