<!DOCTYPE html>
<html>
<head>
    <title>配車アプリ（デバッグ版）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f6; }
        #map { height: 280px; width: 100%; border-radius: 8px; margin-bottom: 10px; background: #ccc; }
        .tabs { display: flex; margin-bottom: 10px; background: #ddd; border-radius: 8px; padding: 4px; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .tab.active { background: white; color: #28a745; }
        .input-group { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; display: none; }
        .input-group.active { display: block; }
        #request-btn { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 1.1em; font-weight: bold; }
        .request-item { background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #28a745; position: relative; }
    </style>
</head>
<body>

    <div class="tabs">
        <div id="tab-now" class="tab active" onclick="switchMode('now')">今すぐ呼ぶ</div>
        <div id="tab-plan" class="tab" onclick="switchMode('plan')">予約する</div>
    </div>

    <div id="plan-input" class="input-group">
        <input type="datetime-local" id="scheduled-time">
    </div>

    <div id="map"></div>
    <button id="request-btn" onclick="requestTaxi()">配車を依頼する</button>

    <div style="margin-top:20px;">
        <h3 style="font-size: 1.1em;">📅 あなたの予約状況</h3>
        <div id="my-requests-list">読み込みを開始します...</div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, onSnapshot, doc, deleteDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        // --- 地図の初期化（これを一番先にやる） ---
        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        const pickupMarker = L.marker([35.6812, 139.7671], { draggable: true }).addTo(map);

        try {
            const app = initializeApp(firebaseConfig);
            const db = getFirestore(app);
            let userName = "ゲスト";

            // --- LIFFの初期化 ---
            liff.init({ liffId: "2009796540-v9rIRiac" }).then(() => {
                if (liff.isLoggedIn()) {
                    liff.getProfile().then(p => {
                        userName = p.displayName;
                        watchMyRequests(db, userName);
                    });
                } else {
                    liff.login();
                }
            }).catch(err => {
                alert("LIFF初期化失敗: " + err);
                // LIFFがダメでもゲストとしてリスト表示を試みる
                watchMyRequests(db, "ゲスト");
            });

            // --- リスト表示機能 ---
            function watchMyRequests(db, name) {
                const listDiv = document.getElementById("my-requests-list");
                const q = query(collection(db, "requests"), where("name", "==", name));
                
                onSnapshot(q, (snapshot) => {
                    listDiv.innerHTML = "";
                    if (snapshot.empty) {
                        listDiv.innerHTML = "現在、依頼はありません。";
                    }
                    snapshot.forEach(d => {
                        const data = d.data();
                        const item = document.createElement("div");
                        item.className = "request-item";
                        item.innerHTML = `<b>${data.type}</b><br><small>${data.address}</small>`;
                        listDiv.appendChild(item);
                    });
                }, (err) => {
                    alert("Firestore読み込みエラー: " + err.message);
                });
            }

        } catch (e) {
            alert("全体エラー: " + e.message);
        }

        window.switchMode = (m) => {
            document.getElementById('plan-input').className = (m === 'plan') ? 'input-group active' : 'input-group';
            document.getElementById('tab-now').className = (m === 'now') ? 'tab active' : 'tab';
            document.getElementById('tab-plan').className = (m === 'plan') ? 'tab active' : 'tab';
        };
    </script>
</body>
</html>
