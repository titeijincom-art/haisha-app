<!DOCTYPE html>
<html>
<head>
    <title>タクシー配車（社長専用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        #map { height: 40vh; width: 100%; background: #eee; position: relative; z-index: 1; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .form-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            margin-top: -25px; position: relative; z-index: 1000; 
        }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; -webkit-appearance: none; }
        .btn-call { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; background: #000; color: #fff; cursor: pointer; margin-top: 5px;
        }
        .history-section { margin-top: 15px; }
        .history-title { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; padding-left: 5px; }
        .request-item { 
            background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #000;
        }
        .req-addr { font-size: 0.85rem; font-weight: bold; margin-bottom: 3px; }
        .req-info { font-size: 0.75rem; color: #777; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-heading { background: #cfe2ff; color: #084298; }
        .status-arrived { background: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="form-card">
            <div class="input-group">
                <label>配車場所</label>
                <input type="text" id="address" value="読み込み中..." readonly>
            </div>
            
            <div class="input-group">
                <label>利用タイプ</label>
                <select id="requestType">
                    <option value="now">今すぐ呼ぶ</option>
                    <option value="plan">予約する（5分刻み）</option>
                </select>
            </div>

            <div id="timeInputArea" class="input-group" style="display:none;">
                <label>予約日時（5分単位で選択可能）</label>
                <input type="datetime-local" id="scheduledTime" step="300">
            </div>

            <button id="submitBtn" class="btn-call" onclick="sendRequest()">リクエストを送信</button>
        </div>

        <div class="history-section">
            <div class="history-title">現在の状況</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gasUrl = "https://script.google.com/macros/s/AKfycbx0-lafxReulEofMDMPhJA3maxeIcddrz5lJdWKthJQ9CN5eNExMeunYH75C_Yezr0MVg/exec";

        let map, centerMarker, userLineId = "";

        // 予約日時の初期値を「現在時刻の5分切り上げ」に設定する関数
        function setDefaultTime() {
            const now = new Date();
            now.setMinutes(Math.ceil(now.getMinutes() / 5) * 5); // 5分単位に切り上げ
            now.setSeconds(0);
            now.setMilliseconds(0);
            
            // datetime-local形式 (YYYY-MM-DDThh:mm) に変換
            const offset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - offset)).toISOString().slice(0, 16);
            document.getElementById("scheduledTime").value = localISOTime;
        }

        document.getElementById('requestType').addEventListener('change', (e) => {
            const area = document.getElementById("timeInputArea");
            if (e.target.value === "plan") {
                area.style.display = "block";
                setDefaultTime(); // 予約を選んだ時に初期時刻を入れる
            } else {
                area.style.display = "none";
            }
        });

        function initMap() {
            const defLat = 35.6812, defLon = 139.7671;
            map = L.map('map', { zoomControl: false }).setView([defLat, defLon], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            centerMarker = L.marker([defLat, defLon]).addTo(map);
            map.on('move', () => { centerMarker.setLatLng(map.getCenter()); });
            map.on('moveend', () => { updateAddress(map.getCenter().lat, map.getCenter().lng); });
            navigator.geolocation.getCurrentPosition((pos) => {
                map.setView([pos.coords.latitude, pos.coords.longitude], 16);
                centerMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
                updateAddress(pos.coords.latitude, pos.coords.longitude);
            }, null, { enableHighAccuracy: true });
        }

        async function updateAddress(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, { headers: { 'Accept-Language': 'ja' } });
                const data = await res.json();
                document.getElementById("address").value = data.display_name.split(',').slice(0, 3).join('') || "指定地点";
            } catch (e) { document.getElementById("address").value = "地図の位置で指定中"; }
        }

        window.sendRequest = async () => {
            const center = map.getCenter();
            const type = document.getElementById("requestType").value;
            const time = document.getElementById("scheduledTime").value;
            const requestData = {
                userId: userLineId || "president",
                name: "社長",
                address: document.getElementById("address").value,
                latitude: center.lat,
                longitude: center.lng,
                type: type,
                scheduledTime: time || "なし",
                status: "waiting",
                timestamp: new Date()
            };
            try {
                await addDoc(collection(db, "requests"), requestData);
                fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "【新規】", ...requestData }) });
                alert("依頼を送信しました");
            } catch (e) { alert("エラー: " + e.message); }
        };

        function renderHistory() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"), limit(5));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("history-list");
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    if (d.status === "completed") return;
                    const tag = d.status === "heading" ? "status-heading" : (d.status === "arrived" ? "status-arrived" : "status-waiting");
                    const txt = d.status === "heading" ? `向かっています` : (d.status === "arrived" ? "到着" : "待機中");
                    const timeDisp = d.type === "plan" ? d.scheduledTime.replace('T', ' ') : "今すぐ";
                    const item = document.createElement("div");
                    item.className = "request-item";
                    item.innerHTML = `<div class="req-addr">📍 ${d.address}</div><div class="req-info"><span>${timeDisp}</span><span class="status-tag ${tag}">${txt}</span></div>`;
                    list.appendChild(item);
                });
            });
        }

        initMap();
        liff.init({ liffId: "2004245903-kY3aEEnQ" }).then(() => {
            if (liff.isLoggedIn()) { liff.getProfile().then(p => { userLineId = p.userId; renderHistory(); }); }
            else { renderHistory(); liff.login(); }
        }).catch(() => renderHistory());
    </script>
</body>
</html>
