<!DOCTYPE html>
<html>
<head>
    <title>配車アプリ（依頼側）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; width: 100%; margin-bottom: 10px; }
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; }
        #request-btn { background-color: #28a745; color: white; border: none; border-radius: 5px; }
        #status-message { text-align: center; font-size: 1.2em; font-weight: bold; margin: 15px; min-height: 1.5em; }
        .legend { background: white; padding: 5px; border-radius: 5px; font-size: 12px; border: 1px solid #ccc; margin-bottom: 5px; text-align: center; }
    </style>
</head>
<body>
    <div id="status-message"></div>
    <div class="legend">🔵 現在地 / 🔴 送迎場所（ドラッグで移動）</div>
    <div id="map"></div>
    <div class="btn-container">
        <button onclick="getCurrentLocation()">① 現在地を特定</button>
        <button id="request-btn" onclick="requestTaxi()">② 赤いピンの場所に呼ぶ</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userName = "ゲスト";
        let currentMarker; // 🔵 現在地ピン
        let pickupMarker;  // 🔴 送迎場所ピン

        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // 赤色ピンのアイコン設定
        const redIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
            shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        liff.init({ liffId: "2009796540-v9rIRiac" }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(profile => {
                    userName = profile.displayName;
                    watchMyRequest();
                });
            } else {
                liff.login();
            }
        });

        function watchMyRequest() {
            const q = query(collection(db, "requests"), where("name", "==", userName));
            onSnapshot(q, (snapshot) => {
                const statusDiv = document.getElementById("status-message");
                let activeRequest = null;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.status !== "completed") activeRequest = data;
                });

                if (!activeRequest) {
                    statusDiv.innerText = "";
                    return;
                }

                if (activeRequest.status === "arrived") {
                    statusDiv.innerText = "📍 到着しました！外でお待ちください。";
                    statusDiv.style.color = "red";
                } else if (activeRequest.eta) {
                    statusDiv.innerText = `🚗 あと約 ${activeRequest.eta} 分で到着します！`;
                    statusDiv.style.color = "#007bff";
                } else {
                    statusDiv.innerText = "🚕 配車リクエストを送信済み...";
                }
            });
        }

        window.getCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition((position) => {
                const { latitude, longitude } = position.coords;
                const latlng = [latitude, longitude];
                map.setView(latlng, 17);

                // 🔵 現在地ピンの作成・更新（動かせない）
                if (currentMarker) {
                    currentMarker.setLatLng(latlng);
                } else {
                    currentMarker = L.circleMarker(latlng, { radius: 10, color: 'blue', fillColor: '#3388ff', fillOpacity: 0.8 }).addTo(map);
                    currentMarker.bindPopup("あなたは今ここにいます");
                }

                // 🔴 送迎場所ピンの作成・更新（動かせる）
                if (pickupMarker) {
                    pickupMarker.setLatLng(latlng);
                } else {
                    pickupMarker = L.marker(latlng, { draggable: true, icon: redIcon }).addTo(map);
                    pickupMarker.bindPopup("送迎してほしい場所に動かしてください").openPopup();
                }
            });
        };

        window.requestTaxi = async () => {
            if (!pickupMarker) { alert("まずは現在地を特定してください"); return; }
            const pos = pickupMarker.getLatLng();
            try {
                await addDoc(collection(db, "requests"), {
                    name: userName,
                    latitude: pos.lat,
                    longitude: pos.lng,
                    status: "waiting",
                    timestamp: serverTimestamp()
                });
                alert("赤いピンの位置で依頼を送信しました！");
            } catch (e) {
                alert("送信エラー: " + e.message);
            }
        };
    </script>
</body>
</html>
