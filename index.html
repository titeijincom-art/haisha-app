<!DOCTYPE html>
<html>
<head>
    <title>タクシー配車（社長専用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        #map { height: 45vh; width: 100%; background: #ddd; position: relative; z-index: 1; }
        
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .form-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            margin-top: -25px; position: relative; z-index: 1000; 
        }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; }
        
        .flex-box { display: flex; gap: 10px; }
        .btn-call { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; background: #000; color: #fff; cursor: pointer; margin-top: 5px;
        }
        .btn-call:active { opacity: 0.7; }

        .history-section { margin-top: 15px; }
        .history-title { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; padding-left: 5px; }
        .request-item { 
            background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #000;
        }
        .req-addr { font-size: 0.85rem; font-weight: bold; margin-bottom: 3px; }
        .req-info { font-size: 0.75rem; color: #777; display: flex; justify-content: space-between; align-items: center; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-weight: bold; }
        .status-waiting { background: #fff3cd; color: #856404; }
        .status-heading { background: #cfe2ff; color: #084298; }
        .status-arrived { background: #d1e7dd; color: #0f5132; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="form-card">
            <div class="input-group">
                <label>配車場所（地図を動かして調整）</label>
                <input type="text" id="address" value="読み込み中..." readonly>
            </div>

            <div class="input-group flex-box">
                <div style="flex: 1;">
                    <label>利用タイプ</label>
                    <select id="requestType" onchange="toggleTime()">
                        <option value="now">今すぐ呼ぶ</option>
                        <option value="plan">予約する</option>
                    </select>
                </div>
                <div id="timeInput" style="flex: 1; display:none;">
                    <label>予約時間</label>
                    <input type="time" id="scheduledTime">
                </div>
            </div>

            <button id="submitBtn" class="btn-call" onclick="sendRequest()">ここに呼ぶ</button>
        </div>

        <div class="history-section">
            <div class="history-title">現在の依頼状況</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const gasUrl = "https://script.google.com/macros/s/AKfycbx0-lafxReulEofMDMPhJA3maxeIcddrz5lJdWKthJQ9CN5eNExMeunYH75C_Yezr0MVg/exec";

        let map, centerMarker, userLineId = "";

        // 1. 地図の初期化（即座に実行）
        function initMap() {
            // デフォルト：東京駅付近
            const defLat = 35.6812, defLon = 139.7671;
            map = L.map('map', { zoomControl: false }).setView([defLat, defLon], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            centerMarker = L.marker([defLat, defLon]).addTo(map);

            map.on('move', () => { centerMarker.setLatLng(map.getCenter()); });
            map.on('moveend', () => { updateAddress(map.getCenter().lat, map.getCenter().lng); });

            // 現在地を追って地図を動かす
            navigator.geolocation.getCurrentPosition((pos) => {
                const { latitude, longitude } = pos.coords;
                map.setView([latitude, longitude], 16);
                centerMarker.setLatLng([latitude, longitude]);
                updateAddress(latitude, longitude);
            }, (err) => {
                updateAddress(defLat, defLon);
                console.warn("Geolocation Error: " + err.message);
            }, { enableHighAccuracy: true });
        }

        async function updateAddress(lat, lng) {
            const input = document.getElementById("address");
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, { headers: { 'Accept-Language': 'ja' } });
                const data = await res.json();
                input.value = data.display_name.split(',').slice(0, 3).join('') || "指定地点";
            } catch (e) { input.value = "地図の位置で依頼"; }
        }

        window.toggleTime = () => {
            const isPlan = document.getElementById("requestType").value === "plan";
            document.getElementById("timeInput").style.display = isPlan ? "block" : "none";
        };

        window.sendRequest = async () => {
            const center = map.getCenter();
            const requestData = {
                userId: userLineId || "president_direct",
                name: "社長",
                address: document.getElementById("address").value,
                latitude: center.lat,
                longitude: center.lng,
                type: document.getElementById("requestType").value,
                scheduledTime: document.getElementById("scheduledTime").value || "なし",
                status: "waiting",
                timestamp: new Date()
            };

            document.getElementById("submitBtn").disabled = true;

            try {
                await addDoc(collection(db, "requests"), requestData);
                fetch(gasUrl, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "【新規】", ...requestData }) });
                alert("依頼しました");
            } catch (e) {
                alert("エラー: " + e.message);
                document.getElementById("submitBtn").disabled = false;
            }
        };

        function renderHistory() {
            if (!userLineId) return;
            const q = query(collection(db, "requests"), where("userId", "==", userLineId), orderBy("timestamp", "desc"), limit(3));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("history-list");
                list.innerHTML = "";
                snapshot.forEach(doc => {
                    const d = doc.data();
                    if (d.status === "completed") return;
                    const tag = d.status === "heading" ? "status-heading" : (d.status === "arrived" ? "status-arrived" : "status-waiting");
                    const txt = d.status === "heading" ? `向かっています (${d.eta||'?'}分)` : (d.status === "arrived" ? "到着" : "待機中");
                    const item = document.createElement("div");
                    item.className = "request-item";
                    item.innerHTML = `<div class="req-addr">📍 ${d.address}</div><div class="req-info"><span>${d.type==='plan'?'予約':'今すぐ'}</span><span class="status-tag ${tag}">${txt}</span></div>`;
                    list.appendChild(item);
                });
            });
        }

        // 実行開始
        initMap();
        liff.init({ liffId: "2004245903-kY3aEEnQ" }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(p => { userLineId = p.userId; renderHistory(); });
            } else { liff.login(); }
        });
    </script>
</body>
</html>
