<!DOCTYPE html>
<html>
<head>
    <title>配車アプリ（依頼側）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; width: 100%; margin-bottom: 10px; }
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; }
        #request-btn { background-color: #28a745; color: white; border: none; border-radius: 5px; }
        #status-message { text-align: center; font-size: 1.2em; font-weight: bold; margin: 15px; min-height: 1.5em; }
    </style>
</head>
<body>
    <div id="status-message"></div>
    <div id="map"></div>
    <div class="btn-container">
        <button onclick="getCurrentLocation()">① 現在地を特定</button>
        <button id="request-btn" onclick="requestTaxi()">② ここで配車を依頼</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userName = "ゲスト";
        let marker;

        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        liff.init({ liffId: "2009796540-v9rIRiac" }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(profile => {
                    userName = profile.displayName;
                    watchMyRequest();
                });
            } else {
                liff.login();
            }
        });

        function watchMyRequest() {
            // 自分の名前の依頼で、かつ完了(completed)していないものを監視
            const q = query(collection(db, "requests"), where("name", "==", userName), where("status", "!=", "completed"));
            onSnapshot(q, (snapshot) => {
                const statusDiv = document.getElementById("status-message");
                if (snapshot.empty) {
                    statusDiv.innerText = "";
                    return;
                }
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.status === "arrived") {
                        statusDiv.innerText = "📍 ドライバーが到着しました！外でお待ちください。";
                        statusDiv.style.color = "red";
                    } else if (data.eta) {
                        statusDiv.innerText = `🚗 あと約 ${data.eta} 分で到着します！`;
                        statusDiv.style.color = "#007bff";
                    } else {
                        statusDiv.innerText = "🚕 配車を待っています...";
                        statusDiv.style.color = "#007bff";
                    }
                });
            });
        }

        window.getCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition((position) => {
                const { latitude, longitude } = position.coords;
                const latlng = [latitude, longitude];
                map.setView(latlng, 17);
                if (marker) {
                    marker.setLatLng(latlng);
                } else {
                    marker = L.marker(latlng, { draggable: true }).addTo(map);
                    marker.bindPopup("ピンを動かして微調整できます").openPopup();
                }
            });
        };

        window.requestTaxi = async () => {
            if (!marker) { alert("まずは現在地を特定してください"); return; }
            const currentPos = marker.getLatLng();
            try {
                await addDoc(collection(db, "requests"), {
                    name: userName,
                    latitude: currentPos.lat,
                    longitude: currentPos.lng,
                    status: "waiting",
                    timestamp: serverTimestamp()
                });
                alert("指定した位置で依頼を送信しました！");
            } catch (e) {
                alert("送信エラー: " + e.message);
            }
        };
    </script>
</body>
</html>
