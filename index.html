<!DOCTYPE html>
<html>
<head>
    <title>タクシー配車（社長専用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        #map { height: 35vh; width: 100%; background: #eee; }
        .container { padding: 10px; max-width: 500px; margin: auto; box-sizing: border-box; }
        .form-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            margin-top: -25px; position: relative; z-index: 1000; 
        }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #eee; 
            border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; 
        }
        .flex-box { display: flex; gap: 10px; margin-bottom: 12px; }
        .flex-item { flex: 1; }
        .btn-call { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; background: #000; color: #fff; cursor: pointer; 
        }
        .btn-update { background: #007bff; }
        .btn-phone { 
            width: 100%; padding: 12px; border: 1px solid #28a745; border-radius: 12px; 
            font-size: 1rem; font-weight: bold; background: #fff; color: #28a745; 
            cursor: pointer; margin-top: 10px; display: flex; align-items: center; 
            justify-content: center; gap: 8px; text-decoration: none; box-sizing: border-box; 
        }
        .history-item { 
            background: white; border-radius: 12px; padding: 12px; 
            margin-bottom: 8px; border-left: 5px solid #000; 
        }
        .status-tag { background: #eee; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        .btn-small { 
            flex: 1; padding: 8px; border: 1px solid #ddd; 
            border-radius: 6px; background: #fff; font-size: 0.75rem; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="form-card">
            <div class="input-group">
                <label>お迎え場所</label>
                <select id="locationType" onchange="handleLocationTypeChange()">
                    <option value="current">現在地に呼び出す</option>
                    <option value="custom">地図で場所を指定する</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="address" value="住所を取得中..." readonly>
            </div>
            <div class="flex-box">
                <div class="flex-item">
                    <label>利用タイプ</label>
                    <select id="requestType" onchange="toggleTimeInput()">
                        <option value="now">今すぐ</option>
                        <option value="plan">予約</option>
                    </select>
                </div>
                <div id="timeInputArea" class="flex-item" style="display:none;">
                    <label>予約日時</label>
                    <input type="datetime-local" id="scheduledTime" step="300">
                </div>
            </div>
            <button id="submitBtn" class="btn-call" onclick="sendRequest()">リクエストを送信</button>
            <button id="cancelBtn" class="btn-small" style="display:none; width:100%; margin-top:10px;" onclick="resetForm()">編集をキャンセル</button>
            <a href="tel:09013767364" class="btn-phone">📞 運転手に電話をかける</a>
        </div>

        <div id="history-list" style="margin-top:20px;"></div>
    </div>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let map, marker, userPos = { lat: 35.6812, lng: 139.7671 };
        let userLineId = "guest";
        let editId = null;

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([userPos.lat, userPos.lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            marker = L.marker([userPos.lat, userPos.lng]).addTo(map);

            map.on('move', function() {
                if(document.getElementById('locationType').value === 'custom' || editId) marker.setLatLng(map.getCenter());
            });
            map.on('moveend', function() {
                if(document.getElementById('locationType').value === 'custom' || editId) fetchAddr(map.getCenter());
            });

            navigator.geolocation.getCurrentPosition(function(pos) {
                userPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.setView([userPos.lat, userPos.lng], 16);
                marker.setLatLng([userPos.lat, userPos.lng]);
                fetchAddr(userPos);
            }, function() { fetchAddr(userPos); }, { enableHighAccuracy: true });
        }

        async function fetchAddr(pos) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.lat}&lon=${pos.lng}`, { headers: { 'Accept-Language': 'ja' } });
                const data = await res.json();
                document.getElementById('address').value = data.display_name.split(',').slice(0, 3).join('') || "指定地点";
            } catch (e) { document.getElementById('address').value = "地点指定完了"; }
        }

        window.handleLocationTypeChange = function() {
            if (editId) return; // 修正中は切り替えを無視
            const isCustom = document.getElementById('locationType').value === 'custom';
            if (!isCustom) {
                map.setView([userPos.lat, userPos.lng], 16);
                marker.setLatLng([userPos.lat, userPos.lng]);
                map.dragging.disable();
                fetchAddr(userPos);
            } else {
                map.dragging.enable();
            }
        };

        window.toggleTimeInput = function() {
            document.getElementById('timeInputArea').style.display = document.getElementById('requestType').value === 'plan' ? 'block' : 'none';
        };

        window.sendRequest = async function() {
            const pos = marker.getLatLng();
            const type = document.getElementById('requestType').value;
            const payload = {
                address: document.getElementById('address').value,
                latitude: pos.lat,
                longitude: pos.lng,
                type: type,
                scheduledTime: type === 'plan' ? document.getElementById('scheduledTime').value : "なし",
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                userId: userLineId,
                name: "社長"
            };

            try {
                if (editId) {
                    await db.collection("requests").doc(editId).update(payload);
                    alert("更新しました");
                    resetForm();
                } else {
                    payload.status = "waiting";
                    await db.collection("requests").add(payload);
                    alert("送信しました");
                }
            } catch (e) { alert("エラー: " + e.message); }
        };

        window.startEdit = function(id, addr, type, time, lat, lng) {
            editId = id;
            document.getElementById('locationType').value = 'custom';
            map.dragging.enable();
            document.getElementById('address').value = addr;
            document.getElementById('requestType').value = type;
            toggleTimeInput();
            if (type === 'plan') document.getElementById('scheduledTime').value = time;
            
            map.setView([lat, lng], 17);
            marker.setLatLng([lat, lng]);
            
            const btn = document.getElementById('
