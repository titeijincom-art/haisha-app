<!DOCTYPE html>
<html>
<head>
    <title>タクシー配車（ボス専用）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; background: #f4f4f4; color: #333; }
        #map { height: 35vh; width: 100%; background: #eee; position: relative; z-index: 1; }
        .container { padding: 10px; max-width: 500px; margin: auto; }
        .form-card { 
            background: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1); 
            margin-top: -25px; position: relative; z-index: 1000; 
        }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; color: #999; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; background: #f9f9f9; -webkit-appearance: none; }
        
        .flex-box { display: flex; gap: 10px; margin-bottom: 12px; }
        .flex-item { flex: 1; }

        .btn-call { 
            width: 100%; padding: 16px; border: none; border-radius: 12px; 
            font-size: 1.1rem; font-weight: bold; background: #000; color: #fff; cursor: pointer;
        }
        /* 電話ボタン用のスタイル */
        .btn-phone {
            width: 100%; padding: 12px; border: 1px solid #28a745; border-radius: 12px;
            font-size: 1rem; font-weight: bold; background: #fff; color: #28a745; cursor: pointer;
            margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-phone:active { background: #f0fdf4; }

        .btn-update { background: #007bff; }
        
        .history-section { margin-top: 15px; }
        .history-title { font-size: 0.85rem; font-weight: bold; color: #666; margin-bottom: 8px; padding-left: 5px; }
        .request-item { 
            background: white; border-radius: 12px; padding: 12px; margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #000;
        }
        .req-addr { font-size: 0.85rem; font-weight: bold; margin-bottom: 3px; }
        .req-info { font-size: 0.75rem; color: #777; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .btn-row { display: flex; gap: 10px; }
        .btn-small { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 6px; background: #fff; font-size: 0.75rem; cursor: pointer; }
        .btn-del { color: #dc3545; border-color: #f8d7da; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="container">
        <div class="form-card">
            <div class="input-group">
                <label>お迎え場所の指定</label>
                <select id="locationType" onchange="handleLocationTypeChange()">
                    <option value="current">現在地に呼び出す</option>
                    <option value="custom">地図で場所を指定する</option>
                </select>
            </div>

            <div class="input-group">
                <label id="form-label">住所</label>
                <input type="text" id="address" value="読み込み中..." readonly>
            </div>
            
            <div class="flex-box">
                <div class="flex-item">
                    <label>利用タイプ</label>
                    <select id="requestType">
                        <option value="now">今すぐ</option>
                        <option value="plan">予約</option>
                    </select>
                </div>
                <div id="timeInputArea" class="flex-item" style="display:none;">
                    <label>予約日時</label>
                    <input type="datetime-local" id="scheduledTime" step="300" onblur="roundTo5Min(this)">
                </div>
            </div>

            <button id="submitBtn" class="btn-call" onclick="sendRequest()">リクエストを送信</button>
            
            <button class="btn-phone" onclick="makePhoneCall()">
                <span>📞</span> 運転手に電話をかける
            </button>

            <button id="cancelEditBtn" class="btn-small" style="display:none; width:100%; margin-top:10px;" onclick="resetForm()">編集をキャンセル</button>
        </div>

        <div class="history-section">
            <div class="history-title">現在の状況</div>
            <div id="history-list"></div>
        </div>
    </div>

    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A", 
            authDomain: "loser-12855.firebaseapp.com", 
            projectId: "loser-12855", 
            storageBucket: "loser-12855.firebasestorage.app", 
            messagingSenderId: "375707924539", 
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e" 
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let map, centerMarker, userLineId = "", userCurrentPos = null;
        let editId = null;

        // 電話発信関数
        window.makePhoneCall = () => {
            if (confirm("090-1376-7364 へ電話をかけますか？")) {
                window.location.href = "tel:09013767364";
            }
        };

        window.roundTo5Min = (input) => {
            if (!input.value) return;
            let date = new Date(input.value);
            date.setMinutes(Math.round(date.getMinutes() / 5) * 5);
            date.setSeconds(0);
            const offset = date.getTimezoneOffset() * 60000;
            input.value = (new Date(date - offset)).toISOString().slice(0, 16);
        };

        window.handleLocationTypeChange = () => {
            const type = document.getElementById("locationType").value;
            if (type === "current" && userCurrentPos) {
                map.setView([userCurrentPos.lat, userCurrentPos.lng], 17);
                centerMarker.setLatLng([userCurrentPos.lat, userCurrentPos.lng]);
                map.dragging.disable();
                updateAddress(userCurrentPos.lat, userCurrentPos.lng);
            } else {
                map.dragging.enable();
            }
        };

        document.getElementById('requestType').addEventListener('change', (e) => {
            document.getElementById("timeInputArea").style.display = e.target.value === "plan" ? "block" : "none";
        });

        function initMap() {
            const defLat = 35.6812, defLon = 139.7671;
            map = L.map('map', { zoomControl: false }).setView([defLat, defLon], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            centerMarker = L.marker([defLat, defLon]).addTo(map);

            map.on('move', () => { 
                if(document.getElementById("locationType").value === "custom" || editId) {
                    centerMarker.setLatLng(map.getCenter()); 
                }
            });
            map.on('moveend', () => { 
                if(document.getElementById("locationType").value === "custom" || editId) {
                    updateAddress(map.getCenter().lat, map.getCenter().lng); 
                }
            });

            navigator.geolocation.getCurrentPosition((pos) => {
                userCurrentPos = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                handleLocationTypeChange();
            }, null, { enableHighAccuracy: true });
        }

        async function updateAddress(lat, lng) {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`, { headers: { 'Accept-Language': 'ja' } });
                const data = await res.json();
                document.getElementById("address").value = data.display_name.split(',').slice(0, 3).join('') || "指定地点";
            } catch (e) { document.getElementById("address").value = "地図の位置で指定"; }
        }

        window.sendRequest = async () => {
            const center = centerMarker.getLatLng();
            const type = document.getElementById("requestType").value;
            const timeInput = document.getElementById("scheduledTime");
            if (type === "plan") roundTo5Min(timeInput);

            const requestData = {
                address: document.getElementById("address").value,
                latitude: center.lat,
                longitude: center.lng,
                type: type,
                scheduledTime: timeInput.value || "なし",
                timestamp: new Date()
            };

            try {
                if (editId) {
                    await updateDoc(doc(db, "requests", editId), requestData);
                    alert("更新しました");
                    resetForm();
                } else {
                    requestData.userId = userLineId || "president";
                    requestData.name = "社長";
                    requestData.status = "waiting";
                    await addDoc(collection(db, "requests"), requestData);
                    alert("送信しました");
                }
            } catch (e) { alert("エラー: " + e.message); }
        };

        window.startEdit = (id, addr, type, time, lat, lng) => {
            editId = id;
            document.getElementById("locationType").value = "custom";
            map.dragging.enable();
            document.getElementById("address").value = addr;
            document.getElementById("requestType").value = type;
            document.getElementById("timeInputArea").style.display = type === "plan" ? "block" : "none";
            document.getElementById("scheduledTime").value = time !== "なし" ? time : "";
            map.setView([lat, lng], 17);
            centerMarker.setLatLng([lat, lng]);
            document.getElementById("submitBtn").innerText = "内容を更新する";
            document.getElementById("cancelEditBtn").style.display = "block";
        };

        window.resetForm = () => {
            editId = null;
            document.getElementById("submitBtn").innerText = "リクエストを送信";
            document.getElementById("cancelEditBtn").style.display = "none";
            document.getElementById("locationType").value = "current";
            handleLocationTypeChange();
        };

        window.deleteRequest = async (id) => {
            if (confirm("削除しますか？")) await deleteDoc(doc(db, "requests", id));
        };

        function renderHistory() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"), limit(5));
            onSnapshot(q, (snapshot) => {
                const list = document.getElementById("history-list");
                list.innerHTML = "";
                snapshot.forEach(docSnap => {
                    const d = docSnap.data();
                    const id = docSnap.id;
                    if (d.status === "completed") return;
                    const item = document.createElement("div");
                    item.className = "request-item";
                    item.innerHTML = `
                        <div class="req-addr">📍 ${d.address}</div>
                        <div class="req-info">
                            <span>${d.type==='plan'?d.scheduledTime.replace('T',' '):'今すぐ'}</span>
                            <span class="status-tag">${d.status==='heading'?'向かっています':(d.status==='arrived'?'到着':'待機中')}</span>
                        </div>
                        <div class="btn-row">
                            <button class="btn-small" onclick="startEdit('${id}', '${d.address}', '${d.type}', '${d.scheduledTime}', ${d.latitude}, ${d.longitude})">修正</button>
                            <button class="btn-small btn-del" onclick="deleteRequest('${id}')">削除</button>
                        </div>
                    `;
                    list.appendChild(item);
                });
            });
        }

        initMap();
        liff.init({ liffId: "2004245903-kY3aEEnQ" }).then(() => {
            if (liff.isLoggedIn()) { liff.getProfile().then(p => { userLineId = p.userId; renderHistory(); }); }
            else { renderHistory(); liff.login(); }
        });
    </script>
</body>
</html>
