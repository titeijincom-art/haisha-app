<!DOCTYPE html>
<html>
<head>
    <title>配車アプリ（依頼側）</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 400px; width: 100%; margin-bottom: 10px; }
        .btn-container { display: flex; gap: 10px; justify-content: center; }
        button { padding: 10px 20px; font-weight: bold; cursor: pointer; }
        #request-btn { background-color: #28a745; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="btn-container">
        <button onclick="getCurrentLocation()">① 現在地を特定する</button>
        <button id="request-btn" onclick="requestTaxi()">② ここで配車を依頼</button>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // ここに自分のFirebase設定を貼り付けてください！
        const firebaseConfig = {
            apiKey: "AIzaSyBV6WrubOa8gJdX69sZl3i3c1kcXgLL79A",
            authDomain: "loser-12855.firebaseapp.com",
            projectId: "loser-12855",
            storageBucket: "loser-12855.firebasestorage.app",
            messagingSenderId: "375707924539",
            appId: "1:375707924539:web:1f9ff3f0098f9ebf95041e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let userName = "ゲスト";
        let marker;

        // 地図の初期化
        const map = L.map('map').setView([35.6812, 139.7671], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // LIFFの初期化
        liff.init({ liffId: "2009796540-v9rIRiac" }).then(() => {
            if (liff.isLoggedIn()) {
                liff.getProfile().then(profile => {
                    userName = profile.displayName;
                });
            } else {
                liff.login();
            }
        });

        // ① 現在地特定（ピンを動かせるように設定）
        window.getCurrentLocation = () => {
            navigator.geolocation.getCurrentPosition((position) => {
                const { latitude, longitude } = position.coords;
                const latlng = [latitude, longitude];

                map.setView(latlng, 17);

                if (marker) {
                    marker.setLatLng(latlng);
                } else {
                    // draggable: true を追加！これで動かせます
                    marker = L.marker(latlng, { draggable: true }).addTo(map);
                    marker.bindPopup("ピンを長押しして微調整できます").openPopup();
                }
            });
        };

        // ② 配車依頼（「現在のピンの位置」を送信）
        window.requestTaxi = async () => {
            if (!marker) {
                alert("まずは現在地を特定してください");
                return;
            }

            // marker.getLatLng() を使うことで、移動後の座標を取得
            const currentPos = marker.getLatLng();

            try {
                await addDoc(collection(db, "requests"), {
                    name: userName,
                    latitude: currentPos.lat,
                    longitude: currentPos.lng,
                    status: "waiting",
                    timestamp: serverTimestamp()
                });
                alert("指定した位置で依頼を送信しました！");
            } catch (e) {
                alert("送信エラー: " + e.message);
            }
        };
    </script>
</body>
</html>
